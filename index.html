<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNIC Search Tool</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        #result { margin-top: 20px; text-align: left; background: #fff; border-radius: 5px; overflow-x: auto; }
        .loader { display: none; margin: 10px auto; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>CNIC Information</h2>
    <input type="text" id="cnicInput" placeholder="Enter CNIC without dashes" maxlength="13">
    <br>
    <button onclick="fetchDetails()">Get Record</button>
    
    <div id="loader" class="loader"></div>
    <div id="result"></div>
</div>

<script>
    async function fetchDetails() {
        const cnic = document.getElementById('cnicInput').value;
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if(cnic.length < 13) {
            alert("Poora CNIC likhain (13 digits)");
            return;
        }

        resultDiv.innerHTML = "";
        loader.style.display = "block";

        try {
            // Hum apni API ko call kar rahe hain jo humne /api folder mein banayi hai
            const response = await fetch(`/api/fetch-data?cnic=${cnic}`);
            const data = await response.text();
            
            // Result ko box mein display karna
            resultDiv.innerHTML = data;
        } catch (error) {
            resultDiv.innerHTML = "<p style='color:red;'>Service down hai ya data nahi mila.</p>";
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
