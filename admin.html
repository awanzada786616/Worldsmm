<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM ELITE | Admin Control Panel</title>
    
    <!-- UI Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #040608; color: #f8fafc; }
        .sidebar { width: 300px; background: #0a0e14; border-right: 1px solid #1e293b; transition: 0.3s; }
        .glass-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; }
        .glass-card:hover { border-color: #3b82f6; box-shadow: 0 0 25px rgba(59, 130, 246, 0.1); }
        .input-field { background: #020617; border: 1px solid #1e293b; padding: 16px; border-radius: 14px; width: 100%; color: white; outline: none; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .nav-btn { display: flex; align-items: center; padding: 18px 24px; border-radius: 16px; color: #64748b; font-weight: 600; transition: 0.3s; width: 100%; margin-bottom: 8px; }
        .nav-btn:hover, .active-nav { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
        .btn-grad { background: linear-gradient(135deg, #3b82f6, #1d4ed8); padding: 16px 32px; border-radius: 14px; font-weight: 800; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-grad:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="sidebar p-8 sticky top-0 h-screen flex flex-col">
        <div class="mb-12 flex flex-col items-center">
            <img id="adminLogo" src="https://via.placeholder.com/180x50/1e293b/ffffff?text=LOADING..." class="h-12 object-contain mb-4">
            <div class="h-[2px] w-full bg-gradient-to-r from-transparent via-slate-800 to-transparent"></div>
        </div>

        <nav class="flex-1">
            <button onclick="showSection('api')" id="n-api" class="nav-btn active-nav"><i class="fas fa-plug-circle-bolt mr-4"></i> API Provider</button>
            <button onclick="showSection('services')" id="n-services" class="nav-btn"><i class="fas fa-boxes-stacked mr-4"></i> Services</button>
            <button onclick="showSection('orders')" id="n-orders" class="nav-btn"><i class="fas fa-cart-flatbed-suitcases mr-4"></i> Orders</button>
            <button onclick="showSection('users')" id="n-users" class="nav-btn"><i class="fas fa-user-gear mr-4"></i> Users</button>
            <button onclick="showSection('settings')" id="n-settings" class="nav-btn"><i class="fas fa-palette mr-4"></i> Branding</button>
        </nav>

        <div class="mt-auto p-6 glass-card text-center bg-blue-600/5">
            <p class="text-[10px] text-blue-400 font-black uppercase tracking-[2px]">Elite Admin V2</p>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 p-12 max-w-7xl mx-auto w-full">

        <!-- HEADER -->
        <header class="flex justify-between items-center mb-16">
            <div>
                <h1 id="sectionTitle" class="text-4xl font-black text-white italic">Provider Sync</h1>
                <p class="text-slate-500 font-medium">Manage your external SMM connections.</p>
            </div>
            <div class="flex items-center gap-6 glass-card py-3 px-6">
                <div class="text-right">
                    <p class="text-xs font-black text-blue-500 uppercase tracking-widest">Super Admin</p>
                    <p id="adminName" class="text-sm font-bold">Admin Panel</p>
                </div>
                <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-700 rounded-2xl flex items-center justify-center font-black shadow-lg">A</div>
            </div>
        </header>

        <!-- PAGE 1: API INTEGRATION -->
        <section id="api-sec" class="page-sec space-y-10">
            <div class="glass-card p-10">
                <h3 class="text-xl font-bold mb-8 flex items-center text-blue-400"><i class="fas fa-key mr-3"></i> API Configuration</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                        <label class="text-xs font-black text-slate-500 uppercase ml-2">Provider API URL</label>
                        <input type="text" id="apiUrl" placeholder="https://provider.com/api/v2" class="input-field">
                    </div>
                    <div class="space-y-3">
                        <label class="text-xs font-black text-slate-500 uppercase ml-2">API Secret Key</label>
                        <input type="password" id="apiKey" placeholder="Enter API Key" class="input-field">
                    </div>
                    <div class="space-y-3">
                        <label class="text-xs font-black text-slate-500 uppercase ml-2">Profit Commission (%)</label>
                        <input type="number" id="profitPercent" value="15" class="input-field">
                    </div>
                    <div class="flex items-end">
                        <button onclick="fetchFromAPI()" class="btn-grad w-full flex items-center justify-center">
                            <i class="fas fa-cloud-arrow-down mr-3"></i> Get Provider Services
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="apiLoading" class="hidden text-center py-10"><i class="fas fa-atom fa-spin text-5xl text-blue-500"></i></div>
            <div id="apiResponse" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>

        <!-- PAGE 2: SERVICES MANAGEMENT -->
        <section id="services-sec" class="page-sec hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold italic">Active Services</h2>
                <button onclick="addManualPrompt()" class="bg-emerald-600 px-6 py-3 rounded-xl font-bold text-sm"><i class="fas fa-plus mr-2"></i> Add Manual Service</button>
            </div>
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50 text-[10px] text-slate-500 font-black uppercase">
                        <tr>
                            <th class="p-6">Sort</th>
                            <th class="p-6">Category Logo</th>
                            <th class="p-6">Service Name</th>
                            <th class="p-6">Rate (PKR)</th>
                            <th class="p-6 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="serviceTable" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </section>

        <!-- PAGE 3: ORDERS CONTROL -->
        <section id="orders-sec" class="page-sec hidden">
            <h2 class="text-2xl font-bold mb-8 italic text-blue-400">Order Logs</h2>
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-900 text-slate-500 text-[10px] font-black uppercase">
                        <tr>
                            <th class="p-6">ID</th>
                            <th class="p-6">User / Client</th>
                            <th class="p-6">Service Details</th>
                            <th class="p-6">Status</th>
                            <th class="p-6 text-center">Change Status</th>
                        </tr>
                    </thead>
                    <tbody id="orderTable" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </section>

        <!-- PAGE 4: USER MANAGEMENT -->
        <section id="users-sec" class="page-sec hidden">
            <h2 class="text-2xl font-bold mb-8 italic">Registered Clients</h2>
            <div id="userGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <!-- PAGE 5: BRANDING SETTINGS -->
        <section id="settings-sec" class="page-sec hidden">
            <div class="glass-card p-12 max-w-2xl">
                <h2 class="text-2xl font-bold mb-8 text-blue-500">System Branding</h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-xs font-black text-slate-500 uppercase ml-2">Panel Logo URL (PNG/GIF)</label>
                        <input type="text" id="logoInput" placeholder="https://imgur.com/logo.png" class="input-field mt-2">
                    </div>
                    <button onclick="updateGlobalLogo()" class="btn-grad w-full">Save Changes</button>
                </div>
            </div>
        </section>

    </main>

    <!-- SCRIPTS -->
    <script src="config.js"></script>
    <script>
        // Section Navigator
        function showSection(id) {
            document.querySelectorAll('.page-sec').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id + '-sec').classList.remove('hidden');
            document.getElementById('n-' + id).classList.add('active-nav');
            
            const titles = { 'api': 'Provider Sync', 'services': 'Inventory', 'orders': 'Orders Logs', 'users': 'User Base', 'settings': 'Branding' };
            document.getElementById('sectionTitle').innerText = titles[id];
        }

        // Global Logo Update
        async function updateGlobalLogo() {
            const url = document.getElementById('logoInput').value;
            await db.collection("settings").doc("branding").set({ logo: url }, {merge: true});
            alert("Logo Updated!");
        }

        // Load Logo Initially
        db.collection("settings").doc("branding").onSnapshot(doc => {
            if(doc.exists && doc.data().logo) {
                document.getElementById('adminLogo').src = doc.data().logo;
                document.getElementById('logoInput').value = doc.data().logo;
            }
        });

        // 1. API FETCH (PROXY USE)
        async function fetchFromAPI() {
            const url = document.getElementById('apiUrl').value;
            const key = document.getElementById('apiKey').value;
            const margin = document.getElementById('profitPercent').value;
            const resBox = document.getElementById('apiResponse');

            if(!url || !key) return alert("Please enter API details!");

            document.getElementById('apiLoading').classList.remove('hidden');
            resBox.innerHTML = "";

            try {
                // Calling Vercel Proxy to avoid CORS error
                const proxyCall = `/api/proxy?url=${encodeURIComponent(url)}&key=${key}&action=services`;
                const response = await fetch(proxyCall);
                const data = await response.json();

                document.getElementById('apiLoading').classList.add('hidden');

                // Bulk Add Button
                const bulkBtn = document.createElement('button');
                bulkBtn.className = "col-span-full btn-grad bg-emerald-600 mb-4";
                bulkBtn.innerHTML = `<i class="fas fa-bolt mr-2"></i> Import ${data.length} Services at ${margin}% Profit`;
                bulkBtn.onclick = () => bulkSync(data, margin);
                resBox.appendChild(bulkBtn);

                data.forEach(s => {
                    resBox.innerHTML += `
                    <div class="glass-card p-6 flex flex-col justify-between">
                        <h4 class="font-bold text-[13px] text-slate-300 leading-tight h-10 overflow-hidden">${s.name}</h4>
                        <div class="mt-4 flex justify-between items-center border-t border-slate-800 pt-4">
                            <span class="text-emerald-500 font-black tracking-tighter">$${s.rate}</span>
                            <button onclick="addSingle('${s.service}', '${s.name.replace(/'/g,"")}', '${s.category.replace(/'/g,"")}', '${s.rate}', ${margin})" class="text-[10px] bg-slate-800 px-4 py-2 rounded-lg font-black hover:bg-blue-600 transition">ADD</button>
                        </div>
                    </div>`;
                });
            } catch (err) {
                alert("Fetch Error: " + err.message);
                document.getElementById('apiLoading').classList.add('hidden');
            }
        }

        // Add to Database (USD to PKR Conversion)
        async function addSingle(id, name, cat, rate, margin) {
            const pkrRate = parseFloat(rate) * 285; // Change rate as needed
            const finalRate = pkrRate + (pkrRate * margin / 100);
            
            await db.collection("services").doc(id).set({
                name, category: cat, rate: finalRate.toFixed(2),
                providerID: id, sortOrder: 0, catLogo: "https://cdn-icons-png.flaticon.com/512/174/174855.png"
            });
        }

        async function bulkSync(data, margin) {
            if(!confirm("Start importing all services?")) return;
            for(let s of data) {
                await addSingle(s.service, s.name, s.category, s.rate, margin);
            }
            alert("All Imported!");
        }

        // 2. SERVICE MANAGEMENT (REAL-TIME)
        db.collection("services").orderBy("sortOrder", "asc").onSnapshot(snap => {
            const tbody = document.getElementById('serviceTable');
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const s = doc.data();
                tbody.innerHTML += `
                <tr class="hover:bg-slate-800/30 transition">
                    <td class="p-6 text-blue-500 font-black">
                        <div class="flex flex-col gap-1">
                           <button onclick="sortS('${doc.id}', -1)"><i class="fas fa-chevron-up"></i></button>
                           <button onclick="sortS('${doc.id}', 1)"><i class="fas fa-chevron-down"></i></button>
                        </div>
                    </td>
                    <td class="p-6"><img src="${s.catLogo}" class="w-12 h-12 rounded-2xl bg-slate-900 border border-slate-800 p-2 object-contain shadow-lg shadow-black"></td>
                    <td class="p-6 font-bold text-sm max-w-xs truncate">${s.name}</td>
                    <td class="p-6 font-black text-emerald-500">Rs ${s.rate}</td>
                    <td class="p-6 text-center">
                        <button onclick="editServiceLogo('${doc.id}')" class="text-slate-400 hover:text-blue-500 mx-3"><i class="fas fa-image"></i></button>
                        <button onclick="deleteService('${doc.id}')" class="text-red-900 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
            });
        });

        async function sortS(id, v) {
            const ref = db.collection("services").doc(id);
            const d = await ref.get();
            await ref.update({ sortOrder: (d.data().sortOrder || 0) + v });
        }

        async function editServiceLogo(id) {
            const n = prompt("Enter Category Icon URL / GIF Link:");
            if(n) await db.collection("services").doc(id).update({ catLogo: n });
        }

        // 3. USER MANAGEMENT
        db.collection("users").onSnapshot(snap => {
            const grid = document.getElementById('userGrid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                grid.innerHTML += `
                <div class="glass-card p-10 text-center relative">
                    <div class="absolute top-4 right-4 text-[10px] font-black text-slate-700 uppercase">Client</div>
                    <div class="w-20 h-20 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-500 text-3xl font-black">U</div>
                    <p class="text-xs font-black truncate text-slate-400 uppercase tracking-tighter">${u.email}</p>
                    <p class="text-3xl font-black text-emerald-500 mt-6 tracking-tighter">Rs ${u.balance || 0}</p>
                    <button onclick="addBalance('${doc.id}')" class="mt-8 w-full py-3 bg-slate-800 rounded-xl text-xs font-black hover:bg-blue-600 transition shadow-lg">ADD PKR FUND</button>
                </div>`;
            });
        });

        async function addBalance(uid) {
            const amt = prompt("Enter Amount to Add in PKR:");
            if(amt) {
                const ref = db.collection("users").doc(uid);
                const d = await ref.get();
                await ref.update({ balance: parseFloat(d.data().balance || 0) + parseFloat(amt) });
                alert("Fund Added!");
            }
        }

        // 4. ORDER MANAGEMENT
        db.collection("orders").onSnapshot(snap => {
            const tbody = document.getElementById('orderTable');
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const o = doc.data();
                tbody.innerHTML += `
                <tr class="hover:bg-slate-800/30 transition border-b border-slate-900">
                    <td class="p-6 font-mono text-[11px] text-blue-400 font-black">#${doc.id.slice(0,8)}</td>
                    <td class="p-6">
                        <div class="text-sm font-bold text-slate-200">${o.userEmail}</div>
                        <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1">ID: ${o.userID}</div>
                    </td>
                    <td class="p-6 text-[11px] max-w-xs font-medium text-slate-400">${o.serviceName}</td>
                    <td class="p-6">
                        <span class="status-badge ${o.status === 'Completed' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-blue-500/10 text-blue-500'}">${o.status}</span>
                    </td>
                    <td class="p-6 text-center">
                        <select onchange="updateOStatus('${doc.id}', this.value)" class="bg-slate-900 border border-slate-800 p-2 rounded-xl text-[11px] font-black outline-none focus:border-blue-500">
                            <option value="">Update Status</option>
                            <option value="Pending">Pending</option>
                            <option value="Processing">Processing</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </td>
                </tr>`;
            });
        });

        async function updateOStatus(id, s) {
            if(s) await db.collection("orders").doc(id).update({ status: s });
        }

    </script>
</body>
                  </html>
