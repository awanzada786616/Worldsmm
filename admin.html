<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM PRO | Elite Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-[#02040a] text-slate-200 font-['Plus_Jakarta_Sans'] min-h-screen flex">

    <!-- SIDEBAR -->
    <aside class="w-72 bg-[#080a12] border-r border-slate-900 p-8 sticky top-0 h-screen shrink-0">
        <div class="mb-12"><img id="adminLogo" src="" class="h-10 object-contain mb-2"><p class="text-[10px] text-blue-500 font-black uppercase tracking-[3px]">Elite Console</p></div>
        <nav class="space-y-2">
            <button onclick="showPage('api')" id="n-api" class="w-full flex items-center p-4 rounded-2xl text-slate-500 hover:bg-blue-600 hover:text-white transition active-nav font-bold"><i class="fas fa-sync-alt mr-4"></i> API Sync</button>
            <button onclick="showPage('services')" id="n-services" class="w-full flex items-center p-4 rounded-2xl text-slate-500 hover:bg-blue-600 hover:text-white transition font-bold"><i class="fas fa-list mr-4"></i> Inventory</button>
            <button onclick="showPage('users')" id="n-users" class="w-full flex items-center p-4 rounded-2xl text-slate-500 hover:bg-blue-600 hover:text-white transition font-bold"><i class="fas fa-users mr-4"></i> Clients</button>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-12 max-w-7xl mx-auto w-full">
        <header class="flex justify-between items-center mb-16">
            <h1 id="pageTitle" class="text-4xl font-black italic">API Sync</h1>
            <div class="bg-blue-600/10 border border-blue-500/20 px-6 py-2 rounded-2xl text-blue-500 font-black text-xs tracking-widest">SUPER ADMIN</div>
        </header>

        <!-- PAGE: API SYNC -->
        <section id="api-page" class="page-sec space-y-8">
            <div class="bg-[#0f172a] p-10 rounded-[40px] border border-slate-800 shadow-2xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Provider API URL</label>
                        <input type="text" id="apiUrl" placeholder="https://shadowsmmpanel.com/api/v2" class="w-full bg-[#020617] border border-slate-800 p-4 rounded-2xl outline-none focus:border-blue-600">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Your API Key</label>
                        <input type="password" id="apiKey" placeholder="Paste Secret Key" class="w-full bg-[#020617] border border-slate-800 p-4 rounded-2xl outline-none focus:border-blue-600">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Profit Percentage (%)</label>
                        <input type="number" id="profit" value="15" class="w-full bg-[#020617] border border-slate-800 p-4 rounded-2xl outline-none focus:border-blue-600">
                    </div>
                    <div class="flex items-end">
                        <button onclick="fetchServices()" class="w-full bg-blue-600 p-4 rounded-2xl font-black uppercase hover:scale-[1.02] transition shadow-xl shadow-blue-600/20">Fetch Services Now</button>
                    </div>
                </div>
            </div>

            <div id="loader" class="hidden text-center py-10"><i class="fas fa-atom fa-spin text-5xl text-blue-500"></i><p class="mt-4 font-bold text-blue-500">Bypassing Cloudflare...</p></div>
            <div id="apiResults" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- PAGE: SERVICES -->
        <section id="services-page" class="page-sec hidden space-y-8">
            <h2 class="text-2xl font-bold italic">Dashboard Inventory</h2>
            <div class="bg-[#0f172a] rounded-[32px] overflow-hidden border border-slate-800">
                <table class="w-full text-left"><thead class="bg-slate-900/50 text-[10px] font-black text-slate-500 uppercase"><tr><th class="p-6">Icon</th><th class="p-6">Name</th><th class="p-6">Rate</th><th class="p-6">Action</th></tr></thead><tbody id="serviceTable" class="divide-y divide-slate-800"></tbody></table>
            </div>
        </section>

    </main>

    <script src="config.js"></script>
    <script>
        function showPage(id) {
            document.querySelectorAll('.page-sec').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + '-page').classList.remove('hidden');
            document.getElementById('pageTitle').innerText = id.toUpperCase();
        }

        // --- THE ULTIMATE FETCH TRICK ---
        async function fetchServices() {
            const url = document.getElementById('apiUrl').value;
            const key = document.getElementById('apiKey').value;
            const profit = document.getElementById('profit').value;
            if(!url || !key) return alert("Please enter URL and Key!");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('apiResults').innerHTML = "";

            try {
                // Method: AllOrigins RAW (Best for Cloudflare bypass)
                const target = `${url}?action=services&key=${key}`;
                const bypassUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`;

                const res = await fetch(bypassUrl);
                const data = await res.json();

                document.getElementById('loader').classList.add('hidden');

                if(!Array.isArray(data)) {
                    alert("Provider returned an error: " + (data.error || "Check your API key."));
                    return;
                }

                // Show Results with Sync All Button
                const resBox = document.getElementById('apiResults');
                resBox.innerHTML = `<button onclick='syncAll(${JSON.stringify(data)}, ${profit})' class="col-span-full bg-emerald-600 p-5 rounded-2xl font-black mb-6">CLICK TO SYNC ALL ${data.length} SERVICES</button>`;

                data.slice(0, 21).forEach(s => {
                    resBox.innerHTML += `<div class="bg-[#0f172a] p-6 rounded-3xl border border-slate-800 hover:border-blue-600 transition">
                        <h4 class="font-bold text-xs h-10 overflow-hidden leading-tight">${s.name}</h4>
                        <div class="mt-4 flex justify-between items-center pt-4 border-t border-slate-800">
                            <span class="text-emerald-500 font-black">$${s.rate}</span>
                            <span class="text-[10px] text-slate-500 font-bold">${s.category.slice(0,15)}...</span>
                        </div>
                    </div>`;
                });
            } catch (e) {
                alert("Cloudflare is very strong. Ensure your URL is https://shadowsmmpanel.com/api/v2");
                document.getElementById('loader').classList.add('hidden');
            }
        }

        async function syncAll(data, margin) {
            alert("Syncing " + data.length + " services to PKR. Please wait...");
            for(let s of data) {
                const pkrRate = parseFloat(s.rate) * 285;
                const finalRate = pkrRate + (pkrRate * margin / 100);
                await db.collection("services").doc(s.service.toString()).set({
                    name: s.name, category: s.category, rate: finalRate.toFixed(2), providerID: s.service, sortOrder: 0, catLogo: "https://cdn-icons-png.flaticon.com/512/174/174855.png"
                });
            }
            alert("All Services Synced Successfully!");
        }

        // Service Table Loader
        db.collection("services").onSnapshot(snap => {
            const tb = document.getElementById('serviceTable');
            if(!tb) return; tb.innerHTML = "";
            snap.forEach(doc => {
                const s = doc.data();
                tb.innerHTML += `<tr class="border-b border-slate-900"><td class="p-6"><img src="${s.catLogo}" class="w-8 h-8 rounded-lg bg-slate-800 p-1"></td><td class="p-6 text-xs font-bold text-slate-300">${s.name}</td><td class="p-6 font-black text-emerald-500">Rs ${s.rate}</td><td class="p-6 text-center"><button onclick="db.collection('services').doc('${doc.id}').delete()" class="text-red-900"><i class="fas fa-trash"></i></button></td></tr>`;
            });
        });

        db.collection("settings").doc("branding").onSnapshot(doc => { if(doc.exists) document.getElementById('adminLogo').src = doc.data().logo; });
    </script>
</body>
</html>
