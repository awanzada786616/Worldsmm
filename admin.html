<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM ELITE | Ultimate Admin Console</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020408; color: #f1f5f9; }
        .sidebar { width: 280px; background: #080a0f; border-right: 1px solid #1e293b; transition: 0.3s; }
        .glass-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; transition: 0.3s; }
        .input-field { background: #020617; border: 1px solid #1e293b; padding: 14px; border-radius: 14px; width: 100%; color: white; outline: none; }
        .input-field:focus { border-color: #3b82f6; }
        .nav-btn { display: flex; align-items: center; padding: 16px 20px; border-radius: 14px; color: #64748b; font-weight: 600; width: 100%; margin-bottom: 8px; transition: 0.3s; }
        .active-nav { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn-grad { background: linear-gradient(135deg, #3b82f6, #1d4ed8); padding: 14px 28px; border-radius: 12px; font-weight: 800; transition: 0.3s; text-transform: uppercase; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="sidebar p-8 sticky top-0 h-screen flex flex-col shrink-0">
        <div class="mb-12">
            <img id="adminLogo" src="" class="h-10 object-contain">
            <p class="text-[10px] tracking-[3px] text-blue-500 font-black uppercase mt-3">Elite System</p>
        </div>

        <nav class="flex-1">
            <button onclick="showPage('api')" id="n-api" class="nav-btn active-nav"><i class="fas fa-plug-circle-bolt mr-4"></i> API Sync</button>
            <button onclick="showPage('services')" id="n-services" class="nav-btn"><i class="fas fa-boxes-stacked mr-4"></i> Services</button>
            <button onclick="showPage('orders')" id="n-orders" class="nav-btn"><i class="fas fa-shopping-cart mr-4"></i> Orders</button>
            <button onclick="showPage('users')" id="n-users" class="nav-btn"><i class="fas fa-user-gear mr-4"></i> Clients</button>
            <button onclick="showPage('settings')" id="n-settings" class="nav-btn"><i class="fas fa-paint-brush mr-4"></i> Branding</button>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-12 max-w-7xl mx-auto">
        
        <header class="flex justify-between items-center mb-16">
            <h1 id="pageTitle" class="text-4xl font-black italic text-white">API Sync</h1>
            <div class="glass-card py-3 px-6 flex items-center gap-4">
                <span class="text-xs font-black text-blue-500">ADMIN CONSOLE</span>
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black italic">A</div>
            </div>
        </header>

        <!-- API SECTION -->
        <section id="api-page" class="page-sec space-y-10">
            <div class="glass-card p-10">
                <h3 class="text-xl font-bold mb-8 text-blue-400">Provider Backend Integration</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <input type="text" id="apiUrl" placeholder="https://provider.com/api/v2" class="input-field">
                    <input type="password" id="apiKey" placeholder="Your Secret API Key" class="input-field">
                    <input type="number" id="profit" value="15" placeholder="Profit Margin %" class="input-field">
                    <button onclick="fetchFromBackend()" class="btn-grad w-full">Fetch Services via Server</button>
                </div>
            </div>
            <div id="apiLoading" class="hidden text-center"><i class="fas fa-atom fa-spin text-5xl text-blue-500"></i></div>
            <div id="apiResults" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- SERVICES SECTION -->
        <section id="services-page" class="page-sec hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold italic">Active Services</h2>
                <button onclick="toggleModal(true)" class="bg-emerald-600 px-6 py-3 rounded-xl font-bold text-sm hover:bg-emerald-500">Add Manual</button>
            </div>
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50 text-[10px] text-slate-500 font-black uppercase">
                        <tr><th class="p-6">Sort</th><th class="p-6">Icon</th><th class="p-6">Name</th><th class="p-6">Price</th><th class="p-6 text-center">Action</th></tr>
                    </thead>
                    <tbody id="serviceTable" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </section>

        <!-- USERS SECTION -->
        <section id="users-page" class="page-sec hidden">
            <h2 class="text-2xl font-bold mb-8 italic">Registered Clients</h2>
            <div id="userGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <!-- ORDERS SECTION -->
        <section id="orders-page" class="page-sec hidden">
            <h2 class="text-2xl font-bold mb-8 italic">System Orders</h2>
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-900 text-slate-500 text-[10px] font-black uppercase">
                        <tr><th class="p-6">ID</th><th class="p-6">User</th><th class="p-6">Service</th><th class="p-6">Status</th><th class="p-6">Action</th></tr>
                    </thead>
                    <tbody id="orderTable" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </section>

        <!-- BRANDING SECTION -->
        <section id="settings-page" class="page-sec hidden">
            <div class="glass-card p-10 max-w-xl">
                <h2 class="text-2xl font-bold mb-6 text-blue-400">Branding</h2>
                <input type="text" id="logoInp" placeholder="Logo Link (PNG/GIF)" class="input-field mb-6">
                <button onclick="saveLogo()" class="btn-grad w-full">Update Global Logo</button>
            </div>
        </section>

    </main>

    <!-- MANUAL MODAL -->
    <div id="manualModal" class="modal-overlay">
        <div class="glass-card p-10 w-full max-w-lg">
            <h3 class="text-xl font-bold mb-8">Add Manual Service</h3>
            <div class="space-y-4">
                <input type="text" id="mName" placeholder="Service Name" class="input-field">
                <input type="text" id="mCat" placeholder="Category" class="input-field">
                <input type="number" id="mRate" placeholder="Price (PKR)" class="input-field">
                <input type="text" id="mLogo" placeholder="Icon URL" class="input-field">
                <div class="flex gap-4">
                    <button onclick="addManual()" class="btn-grad flex-1 bg-emerald-600">Save</button>
                    <button onclick="toggleModal(false)" class="p-4 bg-slate-800 rounded-xl">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="config.js"></script>
    <script>
        function showPage(id) {
            document.querySelectorAll('.page-sec').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id + '-page').classList.remove('hidden');
            document.getElementById('n-' + id).classList.add('active-nav');
            document.getElementById('pageTitle').innerText = id.toUpperCase();
        }

        function toggleModal(show) { document.getElementById('manualModal').style.display = show ? 'flex' : 'none'; }

        // BRANDING LOGIC
        db.collection("settings").doc("branding").onSnapshot(doc => {
            if(doc.exists && doc.data().logo) {
                document.getElementById('adminLogo').src = doc.data().logo;
                document.getElementById('logoInp').value = doc.data().logo;
            }
        });
        async function saveLogo() {
            const url = document.getElementById('logoInp').value;
            await db.collection("settings").doc("branding").set({ logo: url }, {merge: true});
            alert("Logo Updated Everywhere!");
        }

        // --- BACKEND TRICK FETCH ---
        async function fetchFromBackend() {
            const url = document.getElementById('apiUrl').value;
            const key = document.getElementById('apiKey').value;
            const profit = document.getElementById('profit').value;
            const resBox = document.getElementById('apiResults');

            if(!url || !key) return alert("Fill URL & Key!");
            document.getElementById('apiLoading').classList.remove('hidden');
            resBox.innerHTML = "";

            try {
                // Call our Vercel Serverless Function
                const backend = `/api/fetchServices?url=${encodeURIComponent(url)}&key=${key}`;
                const response = await fetch(backend);
                const data = await response.json();

                document.getElementById('apiLoading').classList.add('hidden');

                if (data.error) throw new Error(data.error);

                data.forEach(s => {
                    resBox.innerHTML += `
                    <div class="glass-card p-6 flex flex-col justify-between">
                        <h4 class="font-bold text-[12px] h-10 overflow-hidden leading-tight text-slate-300">${s.name}</h4>
                        <div class="mt-4 flex justify-between items-center border-t border-slate-800 pt-4">
                            <span class="text-emerald-500 font-black">$${s.rate}</span>
                            <button onclick="addOne('${s.service}', '${s.name.replace(/'/g,"")}', '${s.category.replace(/'/g,"")}', '${s.rate}', ${profit})" class="text-[10px] bg-slate-800 px-3 py-1 rounded-lg">Add</button>
                        </div>
                    </div>`;
                });
            } catch (err) {
                alert("Fetch Error: " + err.message);
                document.getElementById('apiLoading').classList.add('hidden');
            }
        }

        async function addOne(id, name, cat, rate, profit) {
            const pkrRate = parseFloat(rate) * 285;
            const finalRate = pkrRate + (pkrRate * profit / 100);
            await db.collection("services").doc(id).set({
                name, category: cat, rate: finalRate.toFixed(2), providerID: id, sortOrder: 0, catLogo: "https://cdn-icons-png.flaticon.com/512/174/174855.png"
            });
        }

        // --- REAL-TIME LISTENERS WITH NULL-SAFETY ---
        db.collection("services").orderBy("sortOrder", "asc").onSnapshot(snap => {
            const el = document.getElementById('serviceTable');
            if(!el) return;
            el.innerHTML = "";
            snap.forEach(doc => {
                const s = doc.data();
                el.innerHTML += `<tr class="border-b border-slate-900">
                    <td class="p-6"><button onclick="sortS('${doc.id}', 1)"><i class="fas fa-caret-down"></i></button></td>
                    <td class="p-6"><img src="${s.catLogo}" class="w-8 h-8 rounded-lg object-contain bg-slate-800 p-1"></td>
                    <td class="p-6 text-xs font-bold">${s.name}</td>
                    <td class="p-6 text-emerald-500 font-black">Rs ${s.rate}</td>
                    <td class="p-6 text-center">
                        <button onclick="editL('${doc.id}')" class="text-slate-500 mr-2"><i class="fas fa-image"></i></button>
                        <button onclick="deleteS('${doc.id}')" class="text-red-900"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
        });

        db.collection("users").onSnapshot(snap => {
            const el = document.getElementById('userGrid');
            if(!el) return;
            el.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                el.innerHTML += `<div class="glass-card p-10 text-center relative overflow-hidden">
                    <div class="w-16 h-16 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-500 text-2xl font-black">U</div>
                    <p class="text-xs font-black truncate">${u.email}</p>
                    <p class="text-3xl font-black text-emerald-500 mt-4">Rs ${u.balance || 0}</p>
                    <button onclick="addBalance('${doc.id}')" class="mt-6 w-full py-2 bg-slate-800 rounded-xl text-[10px] font-black">ADD PKR FUND</button>
                </div>`;
            });
        });

        db.collection("orders").onSnapshot(snap => {
            const el = document.getElementById('orderTable');
            if(!el) return;
            el.innerHTML = "";
            snap.forEach(doc => {
                const o = doc.data();
                el.innerHTML += `<tr class="border-b border-slate-900 text-xs">
                    <td class="p-6 font-mono text-blue-400">#${doc.id.slice(0,6)}</td>
                    <td class="p-6 font-bold">${o.userEmail}</td>
                    <td class="p-6 max-w-xs truncate">${o.serviceName}</td>
                    <td class="p-6 font-black">${o.status}</td>
                    <td class="p-6">
                        <select onchange="uStatus('${doc.id}', this.value)" class="bg-slate-900 border border-slate-800 p-1 rounded-lg text-[10px]">
                            <option value="">Update</option>
                            <option value="Processing">Processing</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </td>
                </tr>`;
            });
        });

        // ACTIONS
        async function addManual() {
            const n = document.getElementById('mName').value;
            const c = document.getElementById('mCat').value;
            const r = document.getElementById('mRate').value;
            const l = document.getElementById('mLogo').value || "https://cdn-icons-png.flaticon.com/512/174/174855.png";
            await db.collection("services").add({ name: n, category: c, rate: parseFloat(r).toFixed(2), providerID: "manual", sortOrder: 0, catLogo: l });
            alert("Added!"); toggleModal(false);
        }
        async function deleteS(id) { if(confirm("Delete?")) await db.collection("services").doc(id).delete(); }
        async function sortS(id, v) { const ref = db.collection("services").doc(id); const d = await ref.get(); await ref.update({ sortOrder: (d.data().sortOrder || 0) + v }); }
        async function editL(id) { const n = prompt("GIF/Logo Link:"); if(n) await db.collection("services").doc(id).update({ catLogo: n }); }
        async function addBalance(uid) { const amt = prompt("Amount (PKR):"); if(amt) { const ref = db.collection("users").doc(uid); const d = await ref.get(); await ref.update({ balance: parseFloat(d.data().balance || 0) + parseFloat(amt) }); } }
        async function uStatus(id, s) { if(s) await db.collection("orders").doc(id).update({ status: s }); }
    </script>
</body>
</html>
