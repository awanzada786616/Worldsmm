<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SMM ELITE | Super Admin - Connected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <!-- Global Config File -->
    <script src="config.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #02040a; color: #f1f5f9; overflow-x: hidden; }
        .sidebar { width: 280px; background: #080a12; border-right: 1px solid #1e293b; z-index: 50; }
        .glass-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; backdrop-filter: blur(4px); }
        .nav-btn { display: flex; align-items: center; padding: 16px 20px; border-radius: 14px; color: #64748b; font-weight: 600; width: 100%; margin-bottom: 8px; transition: 0.3s; }
        .nav-btn:hover, .active-nav { background: #1d4ed8; color: white; box-shadow: 0 10px 20px rgba(29, 78, 216, 0.2); }
        .input-field { background: #020617; border: 1px solid #1e293b; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #1d4ed8); padding: 14px 28px; border-radius: 12px; font-weight: 800; transition: 0.3s; cursor: pointer; border: none; color: white; }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .page-content { display: none; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="sidebar p-8 sticky top-0 h-screen flex flex-col shrink-0">
        <div class="mb-12">
            <img id="adminLogo" src="https://i.imgur.com/9QqNl0M.png" class="h-10 object-contain" alt="logo">
            <p class="text-[10px] tracking-[3px] text-blue-500 font-black uppercase mt-3 italic">SUPER ADMIN</p>
        </div>
        <nav class="flex-1">
            <button onclick="navTo('dash')" id="n-dash" class="nav-btn active-nav"><i class="fas fa-gauge-high mr-4"></i> Dashboard</button>
            <button onclick="navTo('api')" id="n-api" class="nav-btn"><i class="fas fa-network-wired mr-4"></i> API Sync</button>
            <button onclick="navTo('svcs')" id="n-svcs" class="nav-btn"><i class="fas fa-list mr-4"></i> Services</button>
            <button onclick="navTo('orders')" id="n-orders" class="nav-btn"><i class="fas fa-cart-shopping mr-4"></i> Orders</button>
            <button onclick="navTo('users')" id="n-users" class="nav-btn"><i class="fas fa-users-gear mr-4"></i> Users</button>
            <button onclick="navTo('brand')" id="n-brand" class="nav-btn"><i class="fas fa-palette mr-4"></i> Branding</button>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-12 max-w-7xl mx-auto w-full">
        <header class="flex justify-between items-center mb-12 flex-wrap gap-4">
            <h1 id="pageTitle" class="text-4xl font-black italic text-white">Dashboard</h1>
            <div class="glass-card py-3 px-6 flex items-center gap-4">
                <span class="text-xs font-black text-blue-500">SUPER ADMIN</span>
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold">AD</div>
            </div>
        </header>

        <!-- DASHBOARD -->
        <section id="page-dash" class="page-content active-page">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="glass-card p-8 border-l-8 border-l-blue-600">
                    <p class="text-xs text-slate-500 font-bold uppercase mb-2">Total Users</p>
                    <h2 class="text-4xl font-black" id="stat-users">0</h2>
                </div>
                <div class="glass-card p-8 border-l-8 border-l-emerald-600">
                    <p class="text-xs text-slate-500 font-bold uppercase mb-2">Total Orders</p>
                    <h2 class="text-4xl font-black" id="stat-orders">0</h2>
                </div>
                <div class="glass-card p-8 border-l-8 border-l-amber-600">
                    <p class="text-xs text-slate-500 font-bold uppercase mb-2">Total Revenue (PKR)</p>
                    <h2 class="text-4xl font-black text-emerald-400" id="stat-rev">Rs 0</h2>
                </div>
            </div>
        </section>

        <!-- API SYNC (FETCH WORKING) -->
        <section id="page-api" class="page-content space-y-8">
            <div class="glass-card p-10">
                <h3 class="text-2xl font-bold mb-6 text-blue-500">Smart Provider Sync</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="apiUrl" placeholder="https://yourprovider.com/api/v2" class="input-field">
                    <input type="text" id="apiKey" placeholder="Your API Key" class="input-field">
                    <input type="number" id="profit" value="20" placeholder="Profit %" class="input-field">
                    <div class="flex gap-3">
                        <button onclick="fetchServicesWithFallback()" class="btn-primary flex-1">Fetch & Preview</button>
                    </div>
                </div>
            </div>
            <div id="apiResults" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <!-- SERVICES SECTION -->
        <section id="page-svcs" class="page-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold">Service Inventory</h2>
                <button onclick="toggleModal('mModal', true)" class="bg-emerald-600 px-6 py-3 rounded-xl font-bold text-sm">Add Manual</button>
            </div>
            <div class="glass-card overflow-x-auto">
                <table class="w-full text-left min-w-[600px]">
                    <thead class="bg-slate-900/70 text-[11px] font-black uppercase text-slate-400">
                        <tr><th class="p-5">Icon</th><th class="p-5">Name</th><th class="p-5">Price (PKR)</th><th class="p-5 text-center">Action</th></tr>
                    </thead>
                    <tbody id="serviceTable" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </section>

        <!-- USERS SECTION -->
        <section id="page-users" class="page-content">
            <div id="userGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

    </main>

    <!-- MANUAL MODAL -->
    <div id="mModal" class="modal">
        <div class="glass-card p-10 w-full max-w-lg">
            <h3 class="text-2xl font-bold mb-6">Create Service</h3>
            <div class="space-y-4">
                <input type="text" id="mName" placeholder="Service Name" class="input-field">
                <input type="text" id="mCat" placeholder="Category" class="input-field">
                <input type="number" id="mPrice" placeholder="Price (PKR)" class="input-field">
                <input type="text" id="mLogo" placeholder="Icon URL" class="input-field">
                <button onclick="addManual()" class="btn-primary w-full">Create</button>
                <button onclick="toggleModal('mModal', false)" class="w-full text-slate-400 mt-2">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let previewServices = [];

        function navTo(page) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('page-' + page).classList.add('active-page');
            document.getElementById('n-' + page).classList.add('active-nav');
            document.getElementById('pageTitle').innerText = page.toUpperCase();
        }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

        // --- FETCH LOGIC ---
        async function fetchServicesWithFallback() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const profit = parseFloat(document.getElementById('profit').value) || 0;
            const resBox = document.getElementById('apiResults');
            
            resBox.innerHTML = `<div class="col-span-full p-10 text-center"><i class="fas fa-spinner fa-spin text-3xl"></i><p>Bypassing Cloudflare...</p></div>`;
            
            const endpoint = `${apiUrl}?action=services&key=${apiKey}`;
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(endpoint)}`;

            try {
                const res = await fetch(proxy);
                const data = await res.json();
                
                if(!Array.isArray(data)) throw new Error("Invalid API Key");

                previewServices = data;
                resBox.innerHTML = `<div class="col-span-full mb-6"><button onclick="confirmSyncAll()" class="w-full bg-emerald-600 p-4 rounded-xl font-bold">SYNC ALL ${data.length} SERVICES</button></div>`;
                
                data.slice(0, 12).forEach(s => {
                    resBox.innerHTML += `<div class="glass-card p-5">
                        <h4 class="font-bold text-xs h-10 overflow-hidden">${s.name}</h4>
                        <div class="mt-4 flex justify-between items-center pt-4 border-t border-slate-800">
                            <span class="text-emerald-400 font-bold">$${s.rate}</span>
                            <span class="text-slate-500 text-[10px]">ID: ${s.service}</span>
                        </div>
                    </div>`;
                });
            } catch (err) {
                resBox.innerHTML = `<div class="col-span-full p-10 text-red-500 text-center">Fetch Failed: ${err.message}</div>`;
            }
        }

        async function confirmSyncAll() {
            const profit = parseFloat(document.getElementById('profit').value) || 0;
            const ratePKR = 285;
            for(let s of previewServices) {
                const pkrBase = parseFloat(s.rate) * ratePKR;
                const finalPrice = pkrBase + (pkrBase * profit / 100);
                await db.ref('services/' + s.service).set({
                    name: s.name, category: s.category, rate: finalPrice.toFixed(2),
                    providerID: s.service, catLogo: "https://cdn-icons-png.flaticon.com/512/174/174855.png"
                });
            }
            alert("All Services Synced to PKR!");
            navTo('svcs');
        }

        // --- REALTIME LISTENERS ---
        function init() {
            db.ref('users').on('value', snap => {
                const el = document.getElementById('stat-users');
                if(el) el.innerText = snap.numChildren();
                const grid = document.getElementById('userGrid');
                if(grid) {
                    grid.innerHTML = "";
                    snap.forEach(us => {
                        const u = us.val();
                        grid.innerHTML += `<div class="glass-card p-8 text-center">
                            <p class="font-bold text-sm">${u.email}</p>
                            <p class="text-2xl font-black text-emerald-400 mt-4">Rs ${u.balance || 0}</p>
                            <button onclick="addFund('${us.key}')" class="mt-6 w-full py-2 bg-slate-800 rounded-xl text-xs font-black">ADD FUND</button>
                        </div>`;
                    });
                }
            });

            db.ref('services').on('value', snap => {
                const tb = document.getElementById('serviceTable');
                if(!tb) return;
                tb.innerHTML = "";
                snap.forEach(ss => {
                    const s = ss.val();
                    tb.innerHTML += `<tr class="border-b border-slate-800">
                        <td class="p-5"><img src="${s.catLogo}" class="w-8 h-8 rounded-lg bg-slate-800 p-1"></td>
                        <td class="p-5 text-sm font-bold">${s.name}</td>
                        <td class="p-5 font-black text-emerald-400">Rs ${s.rate}</td>
                        <td class="p-5 text-center"><button onclick="db.ref('services/${ss.key}').remove()" class="text-red-500"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
                });
            });

            db.ref('orders').on('value', snap => {
                if(document.getElementById('stat-orders')) document.getElementById('stat-orders').innerText = snap.numChildren();
            });
        }

        async function addManual() {
            const n = document.getElementById('mName').value;
            const p = document.getElementById('mPrice').value;
            await db.ref('services').push({ name: n, rate: parseFloat(p).toFixed(2), catLogo: "https://cdn-icons-png.flaticon.com/512/174/174855.png" });
            toggleModal('mModal', false);
        }

        async function addFund(uid) {
            const amt = prompt("Amount (PKR):");
            if(amt) {
                const ref = db.ref('users/' + uid + '/balance');
                const snap = await ref.once('value');
                await ref.set(parseFloat(snap.val() || 0) + parseFloat(amt));
            }
        }

        setTimeout(init, 1000);
    </script>
</body>
</html>
